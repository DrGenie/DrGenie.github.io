lang: en-AU

project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - about/index.qmd
    - research/index.qmd
    - research/projects/*/index.qmd
    - publications/index.qmd
    - tools/index.qmd
    - tools/*/index.qmd
    - teaching/index.qmd
    - teaching/behavioural-economics/index.qmd
    - supervision/index.qmd
    - talks-media/index.qmd
    - conferences/index.qmd
    - blog/index.qmd
    - blog/posts/*/index.qmd
    - cv/index.qmd
    - contact/index.qmd
  resources:
    - CNAME
    - .nojekyll
    - robots.txt
    - sitemap.xml
    - assets/**
    - cv/mesfin-genie-cv.pdf
    - eMANDEVA-DecisionAid-V18/**
    - farming-bca-tool-v18/**

website:
  site-url: "https://mesfingenie.com"
  favicon: assets/img/favicon.png
  title: "Mesfin Genie"
  page-navigation: true
  back-to-top-navigation: true
  open-graph:
    locale: en_AU
    site-name: "Mesfin Genie"
    image: /assets/img/og-card.png
  twitter-card:
    card-style: summary_large_image
    creator: "@mesfin_genie"
    image: /assets/img/og-card.png
  search:
    location: navbar
    type: overlay
  navbar:
    pinned: true
    collapse-below: xl
    background: "#ffffff"
    foreground: "#002244"
    title: "Mesfin Genie"
    left:
      - text: "About"
        href: /about/
      - text: "Research"
        menu:
          - text: "Research overview"
            href: /research/
          - text: "Major projects"
            href: /research/#major-projects
          - text: "Research supervision"
            href: /supervision/
      - text: "Publications"
        href: /publications/
      - text: "Tools"
        href: /tools/
      - text: "Teaching"
        menu:
          - text: "Teaching portfolio"
            href: /teaching/
          - text: "Behavioural economics resources"
            href: /teaching/behavioural-economics/
      - text: "Engagement"
        menu:
          - text: "Talks and media"
            href: /talks-media/
          - text: "Conferences"
            href: /conferences/
          - text: "Blog"
            href: /blog/
          - text: "Contact"
            href: /contact/
      - text: "CV"
        href: /cv/
  page-footer:
    border: true
    left: "© 2026 Mesfin Genie"
    center: "Last updated <span data-build-date></span>"
    right: |
      [University profile](https://www.newcastle.edu.au/profile/mesfin-genie){target="_blank"} · [Google Scholar](https://scholar.google.com/citations?user=v2SXM_kAAAAJ&hl=en){target="_blank"} · [ORCID](https://orcid.org/0000-0002-1744-4666){target="_blank"}

format:
  html:
    theme: cosmo
    css: assets/css/site.css
    toc: false
    smooth-scroll: true
    include-in-header: assets/head.html
    include-before-body: assets/body-start.html
    include-after-body: assets/scripts.html
    anchor-sections: false
    link-external-newwindow: true

execute:
  freeze: auto
