lang: en-AU

project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - about/index.qmd
    - research/index.qmd
    - grants/index.qmd
    - publications/index.qmd
    - conferences/index.qmd
    - tools/index.qmd
    - tools/emandeval/index.qmd
    - tools/soil-crc-bca/index.qmd
    - tools/steps/index.qmd
    - teaching/index.qmd
    - teaching/behavioural-economics/index.qmd
    - supervision/index.qmd
    - cv/index.qmd
    - contact/index.qmd
    - writing/index.qmd
    - research/impact/index.qmd
    - research/data-and-code/index.qmd
    - research/projects/mandeval/index.qmd
    - research/projects/fetp-india/index.qmd
    - research/projects/eye-tracking-attribute-ordering/index.qmd
    - research/projects/health-preferences-dce/index.qmd
    - research/projects/decision-support-tools/index.qmd
    - publications/fit-for-purpose/index.qmd
    - publications/guidance-or-misdirection/index.qmd
    - publications/priority-for-self-or-others/index.qmd
    - publications/no-jab-no-access/index.qmd
    - publications/covid-mandate-repository/index.qmd
    - publications/feeling-lonely/index.qmd
    - blog/index.qmd
    - blog/editorial-calendar.qmd
    - blog/posts/*/index.qmd
  resources:
    - CNAME
    - .nojekyll
    - robots.txt
    - assets/**
    - cv/mesfin-genie-cv.pdf
    - eMANDEVA-DecisionAid-V18/**
    - farming-bca-tool-v18/**
    - STEPS-FETP-DecisionAid-V20/**

website:
  site-url: "https://mesfingenie.com"
  favicon: assets/favicon.png
  page-navigation: true
  back-to-top-navigation: true
  open-graph:
    locale: en_AU
    site-name: "Mesfin Genie"
    image: /assets/og-card.png
  twitter-card:
    card-style: summary_large_image
    creator: "@mesfin_genie"
    image: /assets/og-card.png
  search: true
  navbar:
    pinned: true
    collapse-below: lg
    background: "#002244"
    foreground: "#ffffff"
    title: "Mesfin Genie"
    left:
      - text: "Home"
        href: /
      - text: "Research"
        href: /research/
      - text: "Publications"
        href: /publications/
      - text: "Tools"
        href: /tools/
      - text: "Teaching & Supervision"
        href: /teaching/
      - text: "Writing & Talks"
        href: /writing/
      - text: "About"
        href: /about/
    right:
      - text: "CV"
        href: /cv/
  page-footer:
    left: |
      Dr Mesfin Genie · Newcastle Business School, The University of Newcastle, Australia · [mesfin.genie@newcastle.edu.au](mailto:mesfin.genie@newcastle.edu.au)
    center: |
      [CV](/cv/) · [Google Scholar](https://scholar.google.com/citations?user=v2SXM_kAAAAJ&hl=en) · [ORCID](https://orcid.org/0000-0002-1744-4666) · [GitHub](https://github.com/DrGenie)
    right: |
      © 2026 Mesfin Genie

format:
  html:
    theme: cosmo
    css: assets/styles.css
    toc: false
    smooth-scroll: true
    include-in-header: assets/head.html
    include-after-body: assets/scripts.html
    anchor-sections: false
    link-external-newwindow: true

execute:
  freeze: auto
