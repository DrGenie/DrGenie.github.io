lang: en-AU

project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - research/index.qmd
    - publications/index.qmd
    - conferences/index.qmd
    - tools/index.qmd
    - teaching/index.qmd
    - cv/index.qmd
  resources:
    - CNAME
    - .nojekyll
    - robots.txt
    - assets/**
    - cv/mesfin-genie-cv.pdf
    - eMANDEVA-DecisionAid-V18/**
    - farming-bca-tool-v18/**

website:
  title: "Mesfin Genie"
  site-url: "https://mesfingenie.com"
  favicon: assets/favicon.png
  open-graph: true
  twitter-card: true
  search: false
  navbar:
    pinned: true
    background: "#fffdf9"
    foreground: "#17263b"
    title: "Mesfin Genie"
    left:
      - text: "Home"
        href: /
      - text: "Research"
        href: /research/
      - text: "Publications"
        href: /publications/
      - text: "Conferences"
        href: /conferences/
      - text: "Tools"
        href: /tools/
      - text: "Teaching"
        href: /teaching/
      - text: "CV"
        href: /cv/
    right:
      - icon: linkedin
        href: https://au.linkedin.com/in/mesfin-genie-ph-d-65634216
        aria-label: LinkedIn
      - icon: github
        href: https://github.com/DrGenie
        aria-label: GitHub
      - icon: envelope
        href: mailto:mesfin.genie@newcastle.edu.au
        aria-label: Email
  page-footer:
    border: true
    left: "© 2026 Mesfin Genie"
    right: |
      [University profile](https://www.newcastle.edu.au/profile/mesfin-genie){target="_blank"} · [Google Scholar](https://scholar.google.com/citations?user=v2SXM_kAAAAJ&hl=en){target="_blank"} · [ORCID](https://orcid.org/0000-0002-1744-4666){target="_blank"}

format:
  html:
    theme: cosmo
    css: assets/styles.css
    toc: false
    smooth-scroll: true
    include-in-header: assets/head.html
    include-after-body: assets/scripts.html
    anchor-sections: false
    link-external-newwindow: true

execute:
  freeze: auto
