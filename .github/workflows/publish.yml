name: Publish website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build website
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.9.38"

      - name: Clean previous build
        run: rm -rf _site .quarto

      - name: Prepare generated content
        run: python scripts/prepare_build.py

      - name: Validate source files
        run: python scripts/validate_site.py

      - name: Render website
        run: quarto render

      - name: Verify rendered website
        shell: bash
        run: |
          if [ ! -f "_site/index.html" ]; then
            echo "::error::The rendered homepage _site/index.html was not created."
            exit 1
          fi

          echo "Rendered website:"
          du -sh _site
          find _site -type f | wc -l

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy website
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 40

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          timeout: 1800000
          error_count: 30
          reporting_interval: 10000
