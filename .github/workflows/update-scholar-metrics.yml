name: Update Google Scholar metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Attempt verified metrics update
        run: python scripts/update_scholar_metrics.py

      - name: Commit verified changes
        run: |
          if git diff --quiet assets/scholar-metrics.json; then
            echo "No verified change."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/scholar-metrics.json
          git commit -m "Update verified Google Scholar metrics"
          git push
