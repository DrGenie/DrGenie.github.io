name: Update Google Scholar metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write

concurrency:
  group: scholar-metrics
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Attempt verified metrics update
        run: python scripts/update_scholar_metrics.py

      - name: Commit verified changes
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- assets/scholar-metrics.json)" ]]; then
            echo "No verified metrics change."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/scholar-metrics.json

          if git diff --cached --quiet; then
            echo "No verified metrics change to commit."
            exit 0
          fi

          git commit -m "Update verified Google Scholar metrics"
          git pull --rebase origin main
          git push origin HEAD:main
